name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pytest_and_lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Run linting
      run: |
        ruff check . || (echo "::error::Linting failed. Run 'ruff check --fix .' locally to fix common issues." && exit 1)
        ruff format --check . || (echo "::error::Formatting failed. Run 'ruff format .' locally to fix." && exit 1)

    - name: Run type checking
      run: |
        mypy wptgen tests || (echo "::error::Type checking failed. Run 'mypy wptgen tests' locally to identify issues." && exit 1)

    - name: Run tests with pytest
      run: |
        pytest
