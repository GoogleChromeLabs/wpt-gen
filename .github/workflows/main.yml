name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_and_type_check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Run linting
      run: |
        ruff check . || (echo "::error::Linting failed. Run 'ruff check --fix .' locally to fix common issues." && exit 1)
        ruff format --check . || (echo "::error::Formatting failed. Run 'ruff format .' locally to fix." && exit 1)

    - name: Run type checking
      run: |
        mypy wptgen tests || (echo "::error::Type checking failed. Run 'mypy wptgen tests' locally to identify issues." && exit 1)

  test:
    needs: lint_and_type_check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.13']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Run tests with pytest
      run: |
        pytest
